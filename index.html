<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>SHARK DAT - REAL-TIME TRACKER</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0b0e11; color: #00ff88; font-family: sans-serif; padding: 20px; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .box { background: #161a1e; border: 1px solid #2b3139; padding: 15px; border-radius: 8px; text-align: center; }
        .label { font-size: 0.75em; color: #848e9c; text-transform: uppercase; margin-bottom: 5px; }
        .val { font-size: 1.4em; font-weight: bold; color: #fff; }
        .card { background: #161a1e; border: 1px solid #2b3139; padding: 15px; border-radius: 12px; margin-top: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .chart-box { background: #161a1e; border: 1px solid #2b3139; padding: 15px; border-radius: 12px; height: 250px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { color: #848e9c; text-align: left; padding: 8px; border-bottom: 1px solid #2b3139; font-size: 0.8em; }
        td { padding: 10px 8px; border-bottom: 1px solid #1e2329; font-size: 0.9em; }
    </style>
</head>
<body>
    <h2 style="color:#fff; margin-bottom: 20px;">🚀 SHARK DAT - REAL-TIME TRACKER V3.4</h2>
    
    <div class="stats">
        <div class="box"><div class="label">Win Rate</div><div class="val" id="wr" style="color:#00ff88">--%</div></div>
        <div class="box"><div class="label">Balance (USDT)</div><div class="val" id="balance">--</div></div>
        <div class="box"><div class="label">Funding</div><div class="val" id="funding" style="color:#f0b90b">--</div></div>
    </div>

    <div class="card">
        <div style="color:#848e9c; font-weight:bold; font-size:0.8em; margin-bottom:10px;">🔥 VỊ THẾ ĐANG MỞ (OPEN POSITIONS)</div>
        <table id="posTable">
            <thead><tr><th>Cặp</th><th>Phía</th><th>Giá Vào</th><th>PnL (USDT)</th><th>ROE (%)</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="grid">
        <div class="chart-box"><canvas id="pChart"></canvas></div>
        <div class="chart-box"><canvas id="fChart"></canvas></div>
    </div>

    <script>
        let charts = {};
        async function update() {
            try {
                const r = await fetch('crypto_status.json?' + Math.random());
                const d = await r.json();
                
                // Cập nhật text
                document.getElementById('wr').innerText = d.win_rate + '%';
                document.getElementById('balance').innerText = d.balance;
                document.getElementById('funding').innerText = d.funding;

                // Cập nhật bảng lệnh
                const tbody = document.querySelector("#posTable tbody");
                if (d.open_positions.length === 0) {
                    tbody.innerHTML = "<tr><td colspan='5' style='text-align:center;color:#474d57;padding:20px;'>Không có lệnh nào đang chạy</td></tr>";
                } else {
                    tbody.innerHTML = d.open_positions.map(p => `
                        <tr>
                            <td>${p.symbol}</td>
                            <td style="color:${p.side.includes('LONG')?'#00ff88':'#ff4d4d'}">${p.side}</td>
                            <td>${p.entry}</td>
                            <td style="color:${p.pnl>=0?'#00ff88':'#ff4d4d'}">${p.pnl}</td>
                            <td style="color:${p.roe>=0?'#00ff88':'#ff4d4d'}">${p.roe}%</td>
                        </tr>
                    `).join('');
                }

                // Vẽ Biểu đồ Giá BTC
                if(charts.p) charts.p.destroy();
                charts.p = new Chart(document.getElementById('pChart'), {
                    type:'line',
                    data:{ labels: d.price_chart.map((_,i)=>i), datasets:[{data:d.price_chart, borderColor:'#00ff88', tension:0.3, pointRadius:0}] },
                    options:{ maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{display:false},y:{grid:{color:'#2b3139'}}}}
                });

                // Vẽ Biểu đồ Funding
                if(charts.f) charts.f.destroy();
                charts.f = new Chart(document.getElementById('fChart'), {
                    type:'bar',
                    data:{ labels: d.funding_chart.map((_,i)=>i), datasets:[{data:d.funding_chart, backgroundColor:'#f0b90b'}] },
                    options:{ maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{display:false},y:{grid:{color:'#2b3139'}}}}
                });
            } catch(e) { console.log("Updating..."); }
        }
        setInterval(update, 10000); update();
    </script>
</body>
</html>
